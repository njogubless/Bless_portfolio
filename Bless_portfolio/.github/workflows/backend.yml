name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_portfolio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/portfolio_backend/requirements.txt

      - name: Install dependencies
        working-directory: backend/portfolio_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        working-directory: backend/portfolio_backend
        run: python manage.py check
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_portfolio

      - name: Run migrations
        working-directory: backend/portfolio_backend
        run: python manage.py migrate
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_portfolio

      - name: Run tests
        working-directory: backend/portfolio_backend
        run: python manage.py test api
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG: "False"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_portfolio

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
